<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mindmap: AI & Media Literacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load D3.js for the mindmap visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Inter', 'Kanit', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            overflow: hidden; /* Prevent scrolling, canvas will handle it */
        }
        
        #mindmap-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        
        #mindmap-container:active {
            cursor: grabbing;
        }

        /* D3 CSS */
        .node circle {
            fill: #fff;
            stroke: #3b82f6; /* Tailwind blue-500 */
            stroke-width: 3px;
            transition: all 0.3s ease;
        }

        .node circle:hover {
            fill: #eff6ff; /* Tailwind blue-50 */
            stroke-width: 4px;
        }

        .node text {
            font-size: 14px;
            fill: #1e293b; /* Tailwind slate-800 */
            pointer-events: none; /* Let the circle handle clicks */
        }
        
        .node text.subtext {
            font-size: 11px;
            fill: #64748b; /* Tailwind slate-500 */
        }

        .link {
            fill: none;
            stroke: #cbd5e1; /* Tailwind slate-300 */
            stroke-width: 2px;
        }
        
        /* Tooltip styling */
        #tooltip {
            position: absolute;
            opacity: 0;
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            pointer-events: none;
            font-size: 12px;
            max-width: 250px;
            transition: opacity 0.2s;
            z-index: 10;
        }
    </style>
    <!-- Import Google Font for Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header / UI overlay -->
    <div class="absolute top-0 left-0 right-0 p-4 z-10 flex justify-between items-center pointer-events-none">
        <div class="pointer-events-auto bg-white/90 backdrop-blur-sm p-4 rounded-xl shadow-md border border-slate-200">
            <h1 class="text-xl font-semibold text-slate-800 mb-1">AI & Media Literacy Mindmap</h1>
            <p class="text-sm text-slate-500">คลิกที่วงกลมสีน้ำเงินเพื่อเปิด/ปิดหัวข้อย่อย • ลากเพื่อเลื่อน • ซูมเข้า/ออกได้</p>
        </div>
        <button id="reset-btn" class="pointer-events-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg shadow transition-colors text-sm font-medium">
            จัดกึ่งกลาง (Reset View)
        </button>
    </div>

    <!-- Tooltip Element -->
    <div id="tooltip"></div>

    <!-- Canvas Container for D3 -->
    <div id="mindmap-container"></div>

    <script>
        // Data Structure corresponding to the provided image, with Thai translations
        const mindmapData = {
            name: "AI & Media Literacy",
            englishName: "",
            description: "การรู้เท่าทันสื่อและปัญญาประดิษฐ์",
            children: [
                {
                    name: "บริบทความสำคัญ",
                    englishName: "Importance Context",
                    description: "เหตุผลและสภาพแวดล้อมที่ทำให้เรื่องนี้สำคัญ",
                    children: [
                        { name: "การมีอยู่ของ AI ในชีวิตประจำวัน", englishName: "Everyday AI Presence" },
                        { name: "โอกาส", englishName: "Opportunities" },
                        { name: "ความเสี่ยงและความท้าทาย", englishName: "Risks Challenges" },
                        { name: "ความเกี่ยวข้องกันของการรู้เท่าทัน", englishName: "Literacy Interdependence" }
                    ]
                },
                {
                    name: "โครงสร้างกรอบแนวคิด",
                    englishName: "Framework Structures",
                    description: "แบ่งออกเป็น 2 กรอบหลัก (AILF และ MAIL)",
                    children: [
                        {
                            name: "องค์ประกอบ AILF",
                            englishName: "AILF Components",
                            children: [
                                {
                                    name: "ขอบเขตความรู้",
                                    englishName: "Knowledge Areas",
                                    children: [
                                        { name: "ธรรมชาติของ AI", englishName: "AI Nature" },
                                        { name: "ข้อมูลสำหรับฝึกสอน", englishName: "Training Data" },
                                        { name: "ขีดความสามารถและข้อจำกัด", englishName: "Capabilities Limits" }
                                    ]
                                },
                                {
                                    name: "ชุดทักษะ",
                                    englishName: "Skills Set",
                                    children: [
                                        { name: "การคิดเชิงวิพากษ์", englishName: "Critical Thinking" },
                                        { name: "การทำงานร่วมกับ AI", englishName: "AI Collaboration" },
                                        { name: "การใช้อย่างสร้างสรรค์", englishName: "Creative Use" }
                                    ]
                                },
                                {
                                    name: "ทัศนคติของผู้เรียน",
                                    englishName: "Learner Attitudes",
                                    children: [
                                        { name: "ไตร่ตรองและรับผิดชอบ", englishName: "Reflective Responsible" },
                                        { name: "อยากรู้อยากเห็นและสร้างนวัตกรรม", englishName: "Curious Innovative" },
                                        { name: "ปรับตัวและเห็นอกเห็นใจ", englishName: "Adaptable Empathetic" }
                                    ]
                                },
                                {
                                    name: "4 โดเมนหลัก",
                                    englishName: "Four Domains",
                                    children: [
                                        { name: "มีส่วนร่วมกับ AI", englishName: "Engage AI" },
                                        { name: "สร้าง AI", englishName: "Create AI" },
                                        { name: "จัดการ AI", englishName: "Manage AI" },
                                        { name: "กำหนดทิศทาง AI", englishName: "Shape AI" }
                                    ]
                                }
                            ]
                        },
                        {
                            name: "กรอบแนวคิด MAIL",
                            englishName: "MAIL Framework",
                            children: [
                                {
                                    name: "มิติของแนวคิด",
                                    englishName: "Concept Dimensions",
                                    children: [
                                        { name: "ผู้สร้างและผู้รับสาร", englishName: "Authors Audiences" },
                                        { name: "ข้อความและความหมาย", englishName: "Messages Meanings" },
                                        { name: "การนำเสนอและความเป็นจริง", englishName: "Representations Realities" }
                                    ]
                                },
                                {
                                    name: "สมรรถนะ MAIL",
                                    englishName: "MAIL Competences",
                                    children: [
                                        { name: "การเข้าถึงและการใช้งาน", englishName: "Access Use" },
                                        { name: "การวิเคราะห์และประเมิน", englishName: "Analyse Evaluate" },
                                        { name: "การมีส่วนร่วมและทำงานร่วมกัน", englishName: "Participate Collaborate" },
                                        { name: "การสร้างสรรค์", englishName: "Create" },
                                        { name: "การไตร่ตรองและกระทำอย่างมีจริยธรรม", englishName: "Reflect Act Ethically" }
                                    ]
                                }
                            ]
                        }
                    ]
                },
                {
                    name: "บทบาทและการประเมิน",
                    englishName: "Assessment Roles",
                    description: "การนำไปประยุกต์ใช้ในการประเมินผลและการศึกษา",
                    children: [
                        {
                            name: "การออกแบบการประเมิน",
                            englishName: "Assessment Design",
                            children: [
                                { name: "ประเภทของงาน", englishName: "Task Types" },
                                { name: "บริบทของงาน", englishName: "Task Contexts" },
                                { name: "ตัวอย่างงาน", englishName: "Example Task" }
                            ]
                        },
                        {
                            name: "บทบาททางการศึกษา",
                            englishName: "Education Roles",
                            children: [
                                { name: "บทบาทของครู", englishName: "Teachers Role" },
                                { name: "ผู้นำระบบ", englishName: "System Leaders" },
                                { name: "ผู้ออกแบบนโยบาย", englishName: "Policy Designers" },
                                { name: "การสนับสนุนจากครอบครัว", englishName: "Families Support" }
                            ]
                        },
                        { name: "การประยุกต์ใช้ข้ามรายวิชา", englishName: "Cross Subject Use" }
                    ]
                }
            ]
        };

        // Set up SVG dimensions
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        // Setup Zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.1, 3])
            .on("zoom", (event) => {
                svgGroup.attr("transform", event.transform);
            });

        // Create the SVG container
        const svg = d3.select("#mindmap-container").append("svg")
            .attr("width", width)
            .attr("height", height)
            .call(zoom)
            .on("dblclick.zoom", null); // Disable double click zoom
            
        // Group for holding the visual elements (for zooming/panning)
        const svgGroup = svg.append("g");

        // Tooltip setup
        const tooltip = d3.select("#tooltip");

        // Margin and dimension settings for the tree layout
        const margin = {top: 20, right: 120, bottom: 20, left: 120};
        
        // Create the tree layout
        // Instead of typical tree, we use cluster to make leaf nodes align, 
        // or just tree with distinct node separation
        const treemap = d3.tree()
            .nodeSize([50, 250]); // [height spacing, width spacing]

        let root;

        function update(source) {
            // Assigns the x and y position for the nodes
            const treeData = treemap(root);

            // Compute the new tree layout.
            const nodes = treeData.descendants();
            const links = treeData.descendants().slice(1);

            // Normalize for fixed-depth (horizontal spacing)
            nodes.forEach(d => { d.y = d.depth * 280; });

            // ****************** Nodes section ***************************

            // Update the nodes...
            const node = svgGroup.selectAll('g.node')
                .data(nodes, d => d.id || (d.id = ++i));

            // Enter any new modes at the parent's previous position.
            const nodeEnter = node.enter().append('g')
                .attr('class', 'node')
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on('click', click)
                .on('mouseover', showTooltip)
                .on('mouseout', hideTooltip);

            // Add Circle for the nodes
            nodeEnter.append('circle')
                .attr('class', 'node')
                .attr('r', 1e-6)
                .style("fill", d => d._children ? "#dbeafe" : "#fff"); // Light blue if collapsed

            // Add Main Text (Thai)
            nodeEnter.append('text')
                .attr("dy", "-.35em")
                .attr("x", d => d.children || d._children ? -13 : 13)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name)
                .style("font-weight", d => d.depth === 0 ? "600" : "500");

            // Add Subtext (English)
            nodeEnter.append('text')
                .attr("class", "subtext")
                .attr("dy", "1em")
                .attr("x", d => d.children || d._children ? -13 : 13)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.englishName ? `(${d.data.englishName})` : "");

            // UPDATE
            const nodeUpdate = nodeEnter.merge(node);

            // Transition to the proper position for the node
            nodeUpdate.transition()
                .duration(duration)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            // Update the node attributes and style
            nodeUpdate.select('circle.node')
                .attr('r', d => d.depth === 0 ? 12 : 8)
                .style("fill", d => d._children ? "#dbeafe" : "#fff") // Light blue if collapsed
                .attr('cursor', 'pointer');

            // Remove any exiting nodes
            const nodeExit = node.exit().transition()
                .duration(duration)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            // On exit reduce the node circles size to 0
            nodeExit.select('circle')
                .attr('r', 1e-6);

            // On exit reduce the opacity of text labels
            nodeExit.select('text')
                .style('fill-opacity', 1e-6);

            // ****************** links section ***************************

            // Update the links...
            const link = svgGroup.selectAll('path.link')
                .data(links, d => d.id);

            // Enter any new links at the parent's previous position.
            const linkEnter = link.enter().insert('path', "g")
                .attr("class", "link")
                .attr('d', d => {
                    const o = {x: source.x0, y: source.y0};
                    return diagonal(o, o);
                });

            // UPDATE
            const linkUpdate = linkEnter.merge(link);

            // Transition back to the parent element position
            linkUpdate.transition()
                .duration(duration)
                .attr('d', d => diagonal(d, d.parent));

            // Remove any exiting links
            const linkExit = link.exit().transition()
                .duration(duration)
                .attr('d', d => {
                    const o = {x: source.x, y: source.y};
                    return diagonal(o, o);
                })
                .remove();

            // Store the old positions for transition.
            nodes.forEach(d => {
                d.x0 = d.x;
                d.y0 = d.y;
            });
        }

        // Creates a curved (diagonal) path from parent to the child nodes
        function diagonal(s, d) {
            const path = `M ${s.y} ${s.x}
                    C ${(s.y + d.y) / 2} ${s.x},
                      ${(s.y + d.y) / 2} ${d.x},
                      ${d.y} ${d.x}`;
            return path;
        }

        // Toggle children on click.
        function click(event, d) {
            if (d.children) {
                d._children = d.children;
                d.children = null;
            } else {
                d.children = d._children;
                d._children = null;
            }
            update(d);
            hideTooltip();
        }

        // Tooltip functions
        function showTooltip(event, d) {
            // Only show tooltip if there's a description
            if(d.data.description) {
                tooltip.transition()
                    .duration(200)
                    .style("opacity", .9);
                tooltip.html(`<strong>${d.data.name}</strong><br/>${d.data.description}`)
                    .style("left", (event.pageX + 15) + "px")
                    .style("top", (event.pageY - 28) + "px");
            }
        }

        function hideTooltip() {
            tooltip.transition()
                .duration(500)
                .style("opacity", 0);
        }

        let i = 0;
        const duration = 750;

        // Initialize D3 Hierarchy
        root = d3.hierarchy(mindmapData, d => d.children);
        root.x0 = height / 2;
        root.y0 = 0;

        // Function to expand/collapse nodes selectively on initial load
        // Let's collapse deep nodes to make it look cleaner initially
        function collapse(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapse);
                d.children = null;
            }
        }

        // Expand root and 1st level, collapse the rest initially
        if(root.children) {
            root.children.forEach(child => {
                 if(child.children) {
                     child.children.forEach(collapse);
                 }
            });
        }

        update(root);

        // Center the visualization function
        function centerMindmap() {
            // Find boundaries of nodes
            const nodes = root.descendants();
            let minX = Infinity, maxX = -Infinity;
            let minY = Infinity, maxY = -Infinity;
            
            nodes.forEach(d => {
                if (d.x < minX) minX = d.x;
                if (d.x > maxX) maxX = d.x;
                if (d.y < minY) minY = d.y;
                if (d.y > maxY) maxY = d.y;
            });
            
            const graphWidth = maxY - minY + 300; // rough estimate
            const graphHeight = maxX - minX + 100;
            
            // Start node near the left center
            const xOffset = height / 2;
            const yOffset = 150; 
            
            // Apply transform smoothly
            svg.transition()
               .duration(750)
               .call(zoom.transform, d3.zoomIdentity.translate(yOffset, xOffset).scale(1));
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            svg.attr("width", window.innerWidth)
               .attr("height", window.innerHeight);
        });

        // Setup Reset Button
        document.getElementById('reset-btn').addEventListener('click', centerMindmap);

        // Initial centering
        setTimeout(centerMindmap, 100);

    </script>
</body>
</html>
